name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

# Least-privilege by default: every job is read-only unless it opts up. The
# release jobs below keep their explicit elevated block.
permissions:
  contents: read

jobs:
  test-unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The Cargo workspace root is cli/, so Cargo.lock + target live there.
          workspaces: cli

      - name: Run unit tests
        run: mise run test:unit

  test-integration:
    name: Run integration tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The Cargo workspace root is cli/, so Cargo.lock + target live there.
          workspaces: cli

      - name: Run integration tests
        run: mise run test:integration

  check-scripts:
    name: Check scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run script checks
        run: mise run scripts:check

  check-build-system:
    name: Check build system
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run build system checks
        run: mise run build-system:check

  check-cli:
    name: Check cli
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The Cargo workspace root is cli/, so Cargo.lock + target live there.
          workspaces: cli

      - name: Run cli checks
        run: mise run cli:check

  build-launcher:
    name: Build launcher
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # This x86_64 Linux runner builds BOTH musl triples. x86_64-musl links
      # via the host `cc` self-contained, but aarch64-musl's default linker is
      # still that x86_64 `cc` — it cannot link arm64 objects ("file in wrong
      # format"), even for the pure-Rust bootstrap. So an aarch64 cross-linker
      # is needed now, not (as previously assumed) only once 0007 lands the
      # C-FFI stack. musl-tools covers x86_64-musl; gcc-aarch64-linux-gnu is the
      # arm64 link driver wired in via the build step's env below.
      - name: Install musl cross-linkers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The Cargo workspace root is cli/, so Cargo.lock + target live there.
          workspaces: cli

      # The linker env must live on the BUILD step (not the apt step above): a
      # step's `env:` is scoped to that step alone. Harmless on macOS, which
      # never builds the aarch64-musl triple and so never consults it.
      - name: Release-build host-native triples
        run: mise run build:launcher
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

  check-supply-chain:
    name: Check supply chain
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      # The RustSec advisory DB must be fetched fresh each run (never cached
      # stale) so newly-disclosed advisories are caught; cargo-deny fails (not
      # warns) if the DB is unavailable.
      - name: Run supply-chain checks
        run: mise run deny:check

  check-architecture:
    name: Check architecture
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: cli

      # No built-binary cache for cargo-pup: a trustworthy out-of-band per-OS
      # checksum cannot be maintained from the dev environment, so we rebuild
      # from source every run (correctness over speed for a compiler plugin).
      # pup:check self-provisions the nightly + cargo-pup via its
      # deps:install:pup dependency on the clean runner.
      - name: Run architecture check (self-provisions the nightly lane)
        run: mise run pup:check

      - name: Run cargo-pup behavioural regression
        run: mise run test:integration:pup

  prerelease:
    name: Create prerelease
    runs-on: macos-latest
    needs:
      - test-unit
      - test-integration
      - check-scripts
      - check-build-system
      - check-cli
      - build-launcher
      - check-supply-chain
      - check-architecture
    if: github.event_name == 'push'
    # Serialise all release pipelines so they can't bump to the same version and
    # race their pushes: cancel-in-progress: false queues runs instead of
    # aborting, and queue: max FIFO-queues them instead of dropping any (and
    # requires cancel-in-progress: false). Keep identical to the other
    # luminosity-release block below.
    concurrency:
      group: luminosity-release
      cancel-in-progress: false
      queue: max
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Sign prerelease
        env:
          LUMINOSITY_RELEASE_SECRET_KEY: ${{ secrets.LUMINOSITY_RELEASE_SECRET_KEY }}
        run: mise run prerelease:sign

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "cli/launcher/bin/luminosity-*"

      - name: Finalise prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

  approve-release:
    name: Approve release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prerelease
    environment: release
    steps:
      - name: Approval gate (no-op; the gate is the environment, not this step)
        run: echo "Stable release approved"

  release:
    name: Create release
    runs-on: macos-latest
    if: github.event_name == 'push'
    needs: approve-release
    # The lock lives HERE, deliberately WITHOUT `environment`: it must not
    # enclose the approval gate (see approve-release), whose Waiting job would
    # hold the group and block every prerelease. This job is locked only after
    # approval, covering just the commit/tag/push window. Keep identical to the
    # other luminosity-release block above.
    concurrency:
      group: luminosity-release
      cancel-in-progress: false
      queue: max
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prepare

      - name: Sign stable release
        env:
          LUMINOSITY_RELEASE_SECRET_KEY: ${{ secrets.LUMINOSITY_RELEASE_SECRET_KEY }}
        run: mise run release:sign

      - name: Attest stable binary provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "cli/launcher/bin/luminosity-*"

      - name: Finalise stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:finalise

      - name: Prepare post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Sign post-stable prerelease
        env:
          LUMINOSITY_RELEASE_SECRET_KEY: ${{ secrets.LUMINOSITY_RELEASE_SECRET_KEY }}
        run: mise run prerelease:sign

      - name: Attest post-stable binary provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "cli/launcher/bin/luminosity-*"

      - name: Finalise post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

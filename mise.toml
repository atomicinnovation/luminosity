[env]
_.python.venv = { path = ".venv", create = true }

[tools]
uv = "0.11.6"
python = "3.14.4"
gh = "2.89.0"
rust = { version = "1.90.0", components = "rustfmt,clippy,llvm-tools-preview" }
"aqua:nextest-rs/nextest/cargo-nextest" = "0.9.138"
"aqua:taiki-e/cargo-llvm-cov" = "0.8.7"
"aqua:EmbarkStudios/cargo-deny" = "0.19.8"
shellcheck = "0.11.0"
shfmt = "3.13.1"
"aqua:rhysd/actionlint" = "1.7.12"

[settings]
experimental = true

[hooks]
postinstall = "uv sync --only-group build --frozen"

[tasks."deps:install:python"]
description = "Install all Python dependencies"
run = "invoke deps.install-python"

[tasks."deps:install:rust-targets"]
description = "Install Rust cross-compile targets required for release builds"
run = "invoke deps.install-rust-targets"

[tasks."deps:install:rust-components"]
description = "Install the rustfmt + clippy rustup components the cli checks need (mise [tools] `components` is not honoured for an already-present toolchain)"
run = "invoke deps.install-rust-components"

[tasks."deps:install:zigbuild"]
description = "Provision the zig + cargo-zigbuild cross-compile toolchain and rustup targets for the four-triple release build"
run = "invoke deps.install-zigbuild"

[tasks."deps:install:pup"]
description = "Provision the cargo-pup nightly toolchain + pinned cargo-pup (rustup-managed, not a mise [tool])"
run = "invoke deps.install-pup"

[tasks."test:unit:tasks"]
description = "Run pytest unit tests for invoke tasks"
depends = ["deps:install:python"]
run = "invoke test.unit.tasks"

[tasks."test:integration:tasks"]
description = "Run pytest integration tests for invoke tasks"
depends = ["deps:install:python"]
run = "invoke test.integration.tasks"

[tasks."test:integration:deny"]
description = "Run the cargo-deny ban-violation regression suite"
depends = ["deps:install:python"]
run = "invoke test.integration.deny"

[tasks."test:integration:pup"]
description = "Run the cargo-pup behavioural regression (requires the nightly lane; check-architecture only, not the test roll-up)"
depends = ["deps:install:python", "deps:install:pup"]
run = "invoke test.integration.pup"

[tasks."test:unit:cli"]
description = "Run the whole Rust workspace's unit tests in one --workspace pass (instrumented coverage unless LUMINOSITY_COVERAGE=off)"
depends = ["deps:install:rust-components"]
run = "invoke test.cli.run"

[tasks."test:unit:launcher"]
description = "Run launcher-crate unit tests only (ad-hoc; the aggregate covers it via test:unit:cli)"
depends = ["deps:install:rust-components"]
run = "invoke test.launcher.run"

[tasks."test:unit:kernel"]
description = "Run kernel-crate unit tests only (ad-hoc; the aggregate covers it via test:unit:cli)"
depends = ["deps:install:rust-components"]
run = "invoke test.kernel.run"

[tasks."test:unit"]
description = "Run all unit tests in parallel"
depends = ["test:unit:tasks", "test:unit:cli"]

[tasks."test:integration"]
description = "Run all integration tests in parallel"
depends = ["test:integration:tasks", "test:integration:deny"]

[tasks.test]
description = "Run all tests in parallel"
depends = ["test:unit", "test:integration"]

[tasks."format:scripts:check"]
description = "Check shell formatting with shfmt (read-only; fails on drift)"
run = "invoke format.scripts.check"

[tasks."format:scripts:fix"]
description = "Format shell scripts in place with shfmt"
run = "invoke format.scripts.fix"

[tasks."format:cli:check"]
description = "Check formatting across the whole Rust workspace with rustfmt (read-only; fails on drift)"
depends = ["deps:install:rust-components"]
run = "invoke format.cli.check"

[tasks."format:cli:fix"]
description = "Format the whole Rust workspace in place with rustfmt"
depends = ["deps:install:rust-components"]
run = "invoke format.cli.fix"

[tasks."format:launcher:check"]
description = "Check launcher-crate Rust formatting with rustfmt (read-only; fails on drift)"
depends = ["deps:install:rust-components"]
run = "invoke format.launcher.check"

[tasks."format:launcher:fix"]
description = "Format the launcher crate in place with rustfmt"
depends = ["deps:install:rust-components"]
run = "invoke format.launcher.fix"

[tasks."format:kernel:check"]
description = "Check kernel-crate Rust formatting with rustfmt (read-only; fails on drift)"
depends = ["deps:install:rust-components"]
run = "invoke format.kernel.check"

[tasks."format:kernel:fix"]
description = "Format the kernel crate in place with rustfmt"
depends = ["deps:install:rust-components"]
run = "invoke format.kernel.fix"

[tasks."format:check"]
description = "Run all format checks (read-only)"
depends = ["format:build-system:check", "format:scripts:check", "format:cli:check"]

[tasks."format:fix"]
description = "Apply all formatters in place"
depends = ["format:build-system:fix", "format:scripts:fix", "format:cli:fix"]

[tasks."lint:scripts:shellcheck:check"]
description = "Lint shell scripts with ShellCheck (config in .shellcheckrc)"
run = "invoke lint.scripts.shellcheck"

[tasks."lint:scripts:bashisms:check"]
description = "Guard the bash-3.2 floor (denylist of bash-4 constructs)"
run = "invoke lint.scripts.bashisms"

[tasks."lint:scripts:check"]
description = "Run all shell lint checks"
depends = ["lint:scripts:shellcheck:check", "lint:scripts:bashisms:check"]

[tasks."scripts:check"]
description = "Run all shell format and lint checks (shfmt + ShellCheck + bashisms)"
depends = ["format:scripts:check", "lint:scripts:check"]

[tasks."lint:cli:check"]
description = "Lint the whole Rust workspace with clippy (pedantic + nursery + restriction, -D warnings)"
depends = ["deps:install:rust-components"]
run = "invoke lint.cli.check"

[tasks."lint:cli:fix"]
description = "Apply clippy's machine-applicable fixes across the whole workspace"
depends = ["deps:install:rust-components"]
run = "invoke lint.cli.fix"

[tasks."lint:launcher:check"]
description = "Lint the launcher crate with clippy (pedantic + nursery + restriction, -D warnings)"
depends = ["deps:install:rust-components"]
run = "invoke lint.launcher.check"

[tasks."lint:launcher:fix"]
description = "Apply clippy's machine-applicable fixes to the launcher crate"
depends = ["deps:install:rust-components"]
run = "invoke lint.launcher.fix"

[tasks."lint:kernel:check"]
description = "Lint the kernel crate with clippy (pedantic + nursery + restriction, -D warnings)"
depends = ["deps:install:rust-components"]
run = "invoke lint.kernel.check"

[tasks."lint:kernel:fix"]
description = "Apply clippy's machine-applicable fixes to the kernel crate"
depends = ["deps:install:rust-components"]
run = "invoke lint.kernel.fix"

[tasks."cli:check"]
description = "Run all workspace-wide format and lint checks (read-only; no tests)"
depends = ["format:cli:check", "lint:cli:check"]

[tasks."launcher:check"]
description = "Targeted launcher-crate rustfmt+clippy for ad-hoc runs; excluded from aggregate `check`, which covers it via the workspace-wide `cli:check` pass"
depends = ["format:launcher:check", "lint:launcher:check"]

[tasks."kernel:check"]
description = "Targeted kernel-crate rustfmt+clippy for ad-hoc runs; excluded from aggregate `check`, which covers it via the workspace-wide `cli:check` pass"
depends = ["format:kernel:check", "lint:kernel:check"]

[tasks."build:launcher"]
description = "Release-build the host-native triples (link/arch guard; in `mise run` default, not `check`)"
depends = ["deps:install:rust-targets"]
run = "invoke build.launcher"

[tasks."build:release"]
description = "Cross-build all four shipped triples from one host via cargo-zigbuild, staging binaries + debug archives + checksums"
depends = ["deps:install:zigbuild"]
run = "invoke build.release"

[tasks."deny:check"]
description = "Check the workspace dependency graph with cargo-deny (advisories, licenses, bans, sources)"
run = "invoke deny.check"

[tasks."pup:check"]
description = "Enforce intra-crate module-import rules with cargo-pup (blocking nightly lane; LUMINOSITY_PUP_MODE=warn downgrades to advisory)"
depends = ["deps:install:pup"]
run = "invoke pup.check"

[tasks."format:build-system:check"]
description = "Check Python formatting with ruff (read-only; fails on drift)"
depends = ["deps:install:python"]
run = "invoke format.build-system.check"

[tasks."format:build-system:fix"]
description = "Format Python in place with ruff"
depends = ["deps:install:python"]
run = "invoke format.build-system.fix"

[tasks."lint:build-system:check"]
description = "Lint Python with ruff (select = ALL)"
depends = ["deps:install:python"]
run = "invoke lint.build-system.check"

[tasks."lint:build-system:fix"]
description = "Apply ruff's safe lint fixes to Python"
depends = ["deps:install:python"]
run = "invoke lint.build-system.fix"

[tasks."types:build-system:check"]
description = "Type-check Python with pyrefly (strict preset)"
depends = ["deps:install:python"]
run = "invoke types.build-system.check"

[tasks."lint:workflows:check"]
description = "Lint GitHub Actions workflows with actionlint (general syntax hygiene; the queue/gate-placement invariants are guarded by tests/unit/tasks/test_workflows.py)"
run = "invoke lint.workflows.actionlint"

[tasks."lint:workflows"]
description = "Lint GitHub Actions workflows with actionlint"
depends = ["lint:workflows:check"]

[tasks."build-system:check"]
description = "Run all Python format, lint, and type checks plus workflow lint (ruff + pyrefly + actionlint)"
depends = ["format:build-system:check", "lint:build-system:check", "types:build-system:check", "lint:workflows:check"]

[tasks."lint:check"]
description = "Run all lint checks"
depends = ["lint:build-system:check", "lint:scripts:check", "lint:cli:check"]

[tasks."lint:fix"]
description = "Apply all safe lint fixes (shell has no autofixer — run `mise run scripts:check` for remaining shell findings)"
depends = ["lint:build-system:fix", "lint:cli:fix"]

[tasks."types:check"]
description = "Run all type checks (tsc + pyrefly)"
depends = ["types:build-system:check"]

[tasks.fix]
description = "Apply all formatters + safe lint fixes (MECHANICAL only — no type-checks, and shell has no autofixer; still run `mise run check` before pushing)"
depends = ["format:fix", "lint:fix"]

[tasks.check]
description = "Read-only format, lint, and type checks plus the cargo-deny/cargo-pup static checks (test-free, build-free; the subset CI mirrors)"
depends = ["build-system:check", "scripts:check", "cli:check", "deny:check", "pup:check"]

[tasks.default]
description = "Full local CI mirror: format-fix, lint, type-check, the whole test roll-up (cli tests carry coverage), the build:launcher host-native release build, and the deny/pup static checks (heavy — reformats in place + compiles Rust several times; for a fast inner loop use a single <component>:check)"
depends = ["format:fix", "lint:check", "types:check", "test", "build:launcher", "deny:check", "pup:check"]

[tasks."version:read"]
description = "Read plugin version"
run = "invoke version.read"

[tasks."version:write"]
description = "Write plugin version"
run = "invoke version.write"

[tasks."version:bump"]
description = "Bump plugin version"
run = "invoke version.bump"

[tasks."github:check-auth"]
description = "Verify the GitHub CLI is authenticated"
run = "invoke github.check-auth"

[tasks."git:check-clean"]
description = "Abort if the working tree has any uncommitted changes"
run = "invoke git.check-clean"

[tasks."prerelease:prepare"]
description = "CI prerelease halve 1: bump version, build binaries, compute checksums"
depends = ["deps:install:zigbuild", "github:check-auth", "git:check-clean"]
run = "invoke prerelease.prepare"

[tasks."prerelease:finalise"]
description = "CI prerelease halve 2: commit, tag, push, create release, upload, publish"
run = "invoke prerelease.finalise"

[tasks."release:prepare"]
description = "CI stable release halve 1: finalise version, update marketplace and changelog, build binaries"
depends = ["deps:install:zigbuild", "github:check-auth", "git:check-clean"]
run = "invoke release.prepare"

[tasks."release:finalise"]
description = "CI stable release halve 2: commit, tag, push, create release, upload, publish"
run = "invoke release.finalise"

[tasks."prerelease"]
description = "Local dev only: full prerelease flow without SLSA attestation"
depends = ["deps:install:rust-targets", "github:check-auth", "git:check-clean"]
run = "invoke prerelease"

[tasks."release"]
description = "Local dev only: full stable release flow without SLSA attestation"
depends = ["deps:install:rust-targets", "github:check-auth", "git:check-clean"]
run = "invoke release"

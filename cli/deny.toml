[graph]
# Include the dev/CI host triples alongside the shipped release triples so ban,
# license, and advisory evaluation also covers what is built and run during
# development and CI, not just the release binaries. Extra targets are cheap.
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-musl",
    "x86_64-unknown-linux-musl",
    "x86_64-unknown-linux-gnu",
]
# Evaluate the graph as shipped (default-features = false, rustls), not
# all-features: all-features would enable feature-gated paths the static
# binaries never build (e.g. reqwest's native-tls) and fire false-positive bans.

[advisories]
# hickory-proto 0.25 DNS-parsing DoS advisories with no upgrade path yet:
# reqwest 0.12 pins hickory-resolver 0.25 (needs hickory-proto 0.25,
# semver-incompatible with the fixed 0.26.1). Exposure is bounded — the launcher
# resolves only GitHub CDN hostnames and the attack needs a malicious DNS
# responder, which can already deny resolution. Remove both when reqwest adopts
# hickory 0.26.
ignore = [
    "RUSTSEC-2026-0118",  # NSEC3 closest-encloser proof unbounded loop
    "RUSTSEC-2026-0119",  # O(n^2) name-compression CPU exhaustion on encode
]
# Explicit policy rather than version-sensitive defaults.
unmaintained = "all"
yanked = "deny"

[licenses]
# The permissive licenses the reqwest/rustls/tokio/clap stack requires. Any
# future copyleft / MPL / *GPL license must be justified per-crate via
# [[licenses.exceptions]], never added to this blanket allow.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # The Mozilla root-certificate bundle embedded by webpki-roots ships under
    # this permissive data license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Exempt local path deps (launcher -> kernel); registry wildcards stay denied.
allow-wildcard-paths = true
# `skip` excludes a package spec and `skip-tree` a whole subtree from the
# `multiple-versions` "found N versions of X" detection only. They do not
# enforce dependency direction — a crate listed here can still appear anywhere
# in the graph. The cross-crate dependency-direction ban is the `[[bans.deny]]`
# block below.
skip = []
skip-tree = []

# `[[bans.deny]]` bans a crate everywhere except through the direct parents
# named in its `wrappers`. Two bans share the mechanism. The TLS/system-C ban
# keeps native-tls/openssl out of the graph entirely — a re-enabled default-tls
# would pull openssl-sys and break the musl-static build (the musl build is the
# authoritative static-link check). The serde-family ban keeps serde,
# serde_json, and the YAML crate reachable only through the crates that
# legitimately use them, so a core crate such as `config` cannot grow a direct
# serde edge. Each `wrappers` list must name every direct dependent in the
# resolved graph; when a dependency bump adds one, reconcile with
# `cargo tree -i <crate>` and add the omitted parent — a failure there is an
# allow-list gap, not an architectural violation.
[[bans.deny]]
crate = "native-tls"

[[bans.deny]]
crate = "openssl"

[[bans.deny]]
crate = "openssl-sys"

[[bans.deny]]
crate = "serde"
wrappers = [
    "cargo-platform",
    "cargo_metadata",
    "config-adapters",
    "luminosity",
    "reqwest",
    "serde_urlencoded",
]

[[bans.deny]]
crate = "serde_json"
wrappers = ["cargo_metadata", "luminosity"]

[[bans.deny]]
crate = "serde-saphyr"
wrappers = ["config-adapters"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

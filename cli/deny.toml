[graph]
# Include the dev/CI host triples alongside the shipped release triples so ban,
# license, and advisory evaluation also covers what is built and run during
# development and CI, not just the release binaries. Extra targets are cheap.
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-musl",
    "x86_64-unknown-linux-musl",
    "x86_64-unknown-linux-gnu",
]
# Evaluate the graph as shipped (default-features = false, rustls), not
# all-features: all-features would enable feature-gated paths the static
# binaries never build (e.g. reqwest's native-tls) and fire false-positive bans.

[advisories]
# hickory-proto 0.25 DNS-parsing DoS advisories with no upgrade path yet:
# reqwest 0.12 pins hickory-resolver 0.25 (needs hickory-proto 0.25,
# semver-incompatible with the fixed 0.26.1). Exposure is bounded — the launcher
# resolves only GitHub CDN hostnames and the attack needs a malicious DNS
# responder, which can already deny resolution. Remove both when reqwest adopts
# hickory 0.26.
ignore = [
    "RUSTSEC-2026-0118",  # NSEC3 closest-encloser proof unbounded loop
    "RUSTSEC-2026-0119",  # O(n^2) name-compression CPU exhaustion on encode
]
# Explicit policy rather than version-sensitive defaults.
unmaintained = "all"
yanked = "deny"

[licenses]
# The permissive licenses the reqwest/rustls/tokio/clap stack requires. Any
# future copyleft / MPL / *GPL license must be justified per-crate via
# [[licenses.exceptions]], never added to this blanket allow.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # The Mozilla root-certificate bundle embedded by webpki-roots ships under
    # this permissive data license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Exempt local path deps (launcher -> kernel); registry wildcards stay denied.
allow-wildcard-paths = true
# rustls only — no transitive dep may re-enable default-tls and break the
# musl-static build. Covers the TLS vector; other system-C linkers (libgit2-sys,
# curl-sys, etc.) can also break static linking and are added here if they
# become relevant. The musl build is the authoritative static-link check.
deny = [
    { crate = "native-tls" },
    { crate = "openssl" },
    { crate = "openssl-sys" },
]
# Cross-crate architectural ban-lists, scaffolded inert for the single-crate
# bootstrap; they become load-bearing once the workspace splits into multiple
# crates.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

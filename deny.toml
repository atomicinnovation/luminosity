[graph]
# The four shipped release triples (ADR-0002) PLUS the two host/CI dev triples,
# so advisory/license/ban evaluation also covers the graph actually built and
# run during development and in the test/check CI jobs (gnu on ubuntu,
# aarch64-darwin locally) — otherwise a banned crate or a dev-triple-only
# advisory would be compiled and executed yet never deny-evaluated. Extra
# targets are cheap to evaluate (no build cost).
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-musl",
    "x86_64-unknown-linux-musl",
    "x86_64-unknown-linux-gnu",
]
# Evaluate the graph as the release ships it (ADR-0010: default-features =
# false, rustls). NOT all-features — that would enable feature-gated paths the
# musl-static binaries never build (e.g. reqwest's native-tls feature) and fire
# false-positive bans. The real static-link guarantee is exercised by build:cli
# (Phase 1); this ban is a complementary, necessary-but-not-sufficient guard.

[advisories]
ignore = []
# Set the policy explicitly rather than leaning on version-sensitive defaults.
unmaintained = "all"
yanked = "deny"

[licenses]
# Pre-seeded with the permissive licenses the ADR-0010 stack (reqwest, rustls,
# tokio, clap and their closures) is known to require, so 0007 is not blocked
# by an unrelated allow-list PR. Any future copyleft / MPL / *GPL license must
# be justified per-crate via [[licenses.exceptions]], never added to this
# blanket allow.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# ADR-0010: rustls only — no transitive dep may re-enable default-tls and break
# the musl-static build. This covers the TLS vector only; other system-C
# linkers (libgit2-sys, curl-sys, libsqlite3-sys w/o bundled, libz-sys) can
# also break the static build and are added here if/when they become relevant.
# The musl build (Phase 1) is the authoritative static-link check.
deny = [
    { crate = "native-tls" },
    { crate = "openssl" },
    { crate = "openssl-sys" },
]
# Architectural infra-crate ban-lists (ADR-0009) are scaffolded here and become
# load-bearing once the workspace splits (config/config-adapters — story 0009;
# later crates — work item 0012). Inert in the single-crate bootstrap.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
